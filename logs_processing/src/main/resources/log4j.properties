# Root logger -- WARN by default, console appender (was previously missing,
# producing "log4j:WARN No appenders could be found" at startup).
log4j.rootCategory=WARN, console
log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.target=System.err
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n

# Spark/Hadoop are noisy at INFO; keep them at WARN.
log4j.logger.org.apache.spark=WARN
log4j.logger.org.spark_project=WARN
log4j.logger.org.apache.hadoop=WARN
log4j.logger.parquet=WARN
log4j.logger.org.apache.parquet=WARN

# Our own code at INFO so println + log.info messages are visible.
log4j.logger.civ5=INFO

# ----------------------------------------------------------------------
# Suppress benign Windows-only shutdown noise.
#
# On Windows, the URLClassLoader that Spark uses to load --jars holds an
# OS-level lock on the JAR file. When the driver JVM shuts down, the
# SparkEnv / ShutdownHookManager hooks try to recursively delete the
# Spark temp dir (which contains userFiles/civ5-1.0.jar) and fail with:
#   java.io.IOException: Failed to delete: ...\userFiles-...\civ5-1.0.jar
# The OS releases the lock seconds later and Windows %TEMP% cleanup
# eventually reaps the directory; the failure is harmless. We silence the
# stack traces so they don't drown out the actual run output.
log4j.logger.org.apache.spark.SparkEnv=ERROR
log4j.logger.org.apache.spark.util.ShutdownHookManager=OFF
log4j.logger.org.apache.hadoop.util.ShutdownHookManager=OFF
